components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        user:
          $ref: "#/components/schemas/AdminUser"
      required: [success, user]

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
      required: [id, username, fullName]

    Announcement:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        isImportant:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, title, content, isImportant, createdAt, updatedAt]

    AnnouncementListResponse:
      type: object
      properties:
        announcements:
          type: array
          items:
            $ref: "#/components/schemas/Announcement"
        total:
          type: integer
      required: [announcements, total]

    CreateAnnouncementRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        isImportant:
          type: boolean
      required: [title, content]

    Event:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        eventDate:
          type: string
        location:
          type: string
        category:
          type: string
        imageUrl:
          type: string
        createdAt:
          type: string
      required: [id, title, description, eventDate, location, category, createdAt]

    EventListResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
      required: [events]

    CreateEventRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        eventDate:
          type: string
        location:
          type: string
        category:
          type: string
        imageUrl:
          type: string
      required: [title, description, eventDate, location, category]

    News:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        summary:
          type: string
        content:
          type: string
        imageUrl:
          type: string
        category:
          type: string
        publishedAt:
          type: string
        createdAt:
          type: string
      required: [id, title, summary, content, category, publishedAt, createdAt]

    NewsListResponse:
      type: object
      properties:
        news:
          type: array
          items:
            $ref: "#/components/schemas/News"
      required: [news]

    CreateNewsRequest:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        content:
          type: string
        imageUrl:
          type: string
        category:
          type: string
        publishedAt:
          type: string
      required: [title, summary, content, category]

    StudentPost:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        authorName:
          type: string
        authorClass:
          type: string
        type:
          type: string
        imageUrl:
          type: string
        isStudentOfMonth:
          type: boolean
        createdAt:
          type: string
      required: [id, title, content, authorName, authorClass, type, isStudentOfMonth, createdAt]

    StudentPostListResponse:
      type: object
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/StudentPost"
      required: [posts]

    CreateStudentPostRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        authorName:
          type: string
        authorClass:
          type: string
        type:
          type: string
        imageUrl:
          type: string
        isStudentOfMonth:
          type: boolean
      required: [title, content, authorName, authorClass, type]

    Teacher:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        branch:
          type: string
        title:
          type: string
        bio:
          type: string
        imageUrl:
          type: string
        videoUrl:
          type: string
        email:
          type: string
        createdAt:
          type: string
      required: [id, fullName, branch, title, createdAt]

    TeacherListResponse:
      type: object
      properties:
        teachers:
          type: array
          items:
            $ref: "#/components/schemas/Teacher"
      required: [teachers]

    CreateTeacherRequest:
      type: object
      properties:
        fullName:
          type: string
        branch:
          type: string
        title:
          type: string
        bio:
          type: string
        imageUrl:
          type: string
        videoUrl:
          type: string
        email:
          type: string
      required: [fullName, branch, title]

    GalleryItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        category:
          type: string
        createdAt:
          type: string
      required: [id, title, imageUrl, category, createdAt]

    GalleryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/GalleryItem"
      required: [items]

    CreateGalleryItemRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        category:
          type: string
      required: [title, imageUrl, category]

    Alumnus:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        graduationYear:
          type: integer
        occupation:
          type: string
        story:
          type: string
        imageUrl:
          type: string
        isMentor:
          type: boolean
        createdAt:
          type: string
      required: [id, fullName, graduationYear, occupation, isMentor, createdAt]

    AlumniListResponse:
      type: object
      properties:
        alumni:
          type: array
          items:
            $ref: "#/components/schemas/Alumnus"
      required: [alumni]

    CreateAlumnusRequest:
      type: object
      properties:
        fullName:
          type: string
        graduationYear:
          type: integer
        occupation:
          type: string
        story:
          type: string
        imageUrl:
          type: string
        isMentor:
          type: boolean
      required: [fullName, graduationYear, occupation]

    ContactRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        subject:
          type: string
        message:
          type: string
      required: [name, email, subject, message]

    ContactMessage:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        subject:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required: [id, name, email, subject, message, isRead, createdAt]

    ContactListResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ContactMessage"
      required: [messages]

    SiteSettings:
      type: object
      properties:
        schoolName:
          type: string
        slogan:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        whatsapp:
          type: string
        heroTitle:
          type: string
        heroSubtitle:
          type: string
        aboutText:
          type: string
        principalName:
          type: string
        principalMessage:
          type: string
        facebookUrl:
          type: string
        twitterUrl:
          type: string
        instagramUrl:
          type: string
        youtubeUrl:
          type: string
