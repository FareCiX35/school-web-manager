services:
  - type: web
    runtime: node
    name: school-web-manager
    region: frankfurt
    plan: free
    autoDeployTrigger: commit
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build:prod
    preDeployCommand: pnpm --filter @workspace/db run push
    startCommand: pnpm run start:prod
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        fromDatabase:
          name: school-web-manager-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: school-web-manager-db
    region: frankfurt
    plan: free
    postgresMajorVersion: "17"
    databaseName: school_web_manager
    ipAllowList: []
